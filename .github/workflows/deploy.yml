name: Quick Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PORT: ${{ secrets.PORT }}
      TOKEN: ${{ secrets.TOKEN }}
      ENCODING_AES_KEY: ${{ secrets.ENCODING_AES_KEY }}
      CORP_ID: ${{ secrets.CORP_ID }}
      CORP_SECRET: ${{ secrets.CORP_SECRET }}
    steps:
    # 使用 actions/checkout 自动处理所有 Git 操作
    - uses: actions/checkout@v5

    # 直接使用当前目录（Runner 已经帮你拉好代码了）
    - run: npm install
    
    - name: Create .env
      run: |
        cat > .env << EOF
        PORT=${{ secrets.PORT }}
        TOKEN=${{ secrets.TOKEN }}
        ENCODING_AES_KEY=${{ secrets.ENCODING_AES_KEY }}
        CORP_ID=${{ secrets.CORP_ID }}
        CORP_SECRET=${{ secrets.CORP_SECRET }}
        EOF

    - name: Start with PM2
      run: |
        # 创建日志目录
        mkdir -p logs
        
        # 停止旧应用（如果存在）
        pm2 delete my-app 2>/dev/null || echo "No existing app"
        
        # 启动新应用 - 使用 ecosystem.config.js
        pm2 start ecosystem.config.js --env production
        
        # 保存 PM2 配置
        pm2 save
        
        sleep 3
        pm2 status
    
    - name: Test
      run: |
        curl -f http://localhost:${{ secrets.PORT || 3000 }}/

name: Quick Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PORT: ${{ secrets.PORT }}
      TOKEN: ${{ secrets.TOKEN }}
      ENCODING_AES_KEY: ${{ secrets.ENCODING_AES_KEY }}
    steps:
    # 使用 actions/checkout 自动处理所有 Git 操作
    - uses: actions/checkout@v5

    # 直接使用当前目录（Runner 已经帮你拉好代码了）
    - run: npm install
    
    - name: Create .env
      run: |
        cat > .env << EOF
        PORT=${{ secrets.PORT }}
        TOKEN=${{ secrets.TOKEN }}
        ENCODING_AES_KEY=${{ secrets.ENCODING_AES_KEY }}
        EOF
    
    - name: Install PM2 globally
      run: |
        npm install -g pm2
        # 确保 pm2 在 PATH 中
        echo "$(npm prefix -g)/bin" >> $GITHUB_PATH

    - name: Start with PM2
      run: |
        # 停止并删除旧应用
        pm2 delete my-app || true
        
        # 启动新应用
        pm2 start app.js --name my-app
        
        # 保存进程列表
        pm2 save
        
        # 设置开机自启（可选）
        pm2 startup
        
        sleep 3
        pm2 status
    
    - name: Test
      run: |
        curl -f http://localhost:${{ secrets.PORT || 3000 }}/

name: Quick Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PORT: ${{ secrets.PORT }}
      TOKEN: ${{ secrets.TOKEN }}
      ENCODING_AES_KEY: ${{ secrets.ENCODING_AES_KEY }}
    steps:
    # 使用 actions/checkout 自动处理所有 Git 操作
    - uses: actions/checkout@v5

    # 直接使用当前目录（Runner 已经帮你拉好代码了）
    - run: npm install
    
    - name: Create .env
      run: |
        cat > .env << EOF
        PORT=${{ secrets.PORT }}
        TOKEN=${{ secrets.TOKEN }}
        ENCODING_AES_KEY=${{ secrets.ENCODING_AES_KEY }}
        EOF
    
    - run: |
        pkill -f "node app.js" || true
        nohup node app.js > app.log 2>&1 &
        sleep 3
        curl -f http://localhost:${{ secrets.PORT || 3000 }}/ || (cat app.log && exit 1)

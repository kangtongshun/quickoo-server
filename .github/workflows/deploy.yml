name: Quick Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Deploy
      run: |
        # 进入应用目录
        cd /opt/wecom-app
        
        # 拉取最新代码
        git pull origin main
        
        # 安装生产依赖（不安装 nodemon）
        npm ci --production
        
        # 创建 .env 文件
        cat > .env << EOF
        PORT=${{ secrets.PORT }}
        TOKEN=${{ secrets.TOKEN }}
        ENCODING_AES_KEY=${{ secrets.ENCODING_AES_KEY }}
        EOF
        
        # 停止旧进程
        pkill -f "node app.js" || true
        
        # 启动新进程（后台运行）
        nohup node app.js > app.log 2>&1 &
        
        # 等待服务启动
        sleep 3
        
        # 健康检查
        if curl -f http://localhost:${{ secrets.PORT || 3000 }}/; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Health check failed"
          cat app.log
          exit 1
        fi
